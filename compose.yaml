services:
  frontend-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://host.docker.internal}
      API_PROXY_HOST_HEADER: ${API_PROXY_HOST_HEADER:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - psa_front_node_modules:/app/node_modules

volumes:
  psa_front_node_modules:
