name: CI

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: psa-front

jobs:
  ci:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build frontend Docker image
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build -t psa-front:ci .

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push frontend Docker image
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="${REGISTRY}/${OWNER}/${IMAGE_NAME}"

          docker build \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${GITHUB_SHA}" \
            .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA}"

  deploy:
    name: Deploy to VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    concurrency:
      group: production-frontend-deploy
      cancel-in-progress: false

    steps:
      - name: Configure SSH
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy frontend service
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT || '22' }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_PROJECT_DIR: ${{ vars.VPS_PROJECT_DIR }}
        run: |
          : "${VPS_HOST:?VPS_HOST repository variable is required}"
          : "${VPS_PORT:?VPS_PORT repository variable is required}"
          : "${VPS_USER:?VPS_USER repository variable is required}"
          : "${VPS_PROJECT_DIR:?VPS_PROJECT_DIR repository variable is required}"

          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_PROJECT_DIR' && \
             git fetch --prune origin && \
             git reset --hard 'origin/$GITHUB_REF_NAME' && \
             make prod-pull && \
             make prod-up"

      - name: Smoke-check production routing
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
        run: |
          : "${VPS_HOST:?VPS_HOST repository variable is required}"

          curl -fsS \
            --retry 5 \
            --retry-delay 5 \
            --retry-connrefused \
            --max-time 10 \
            "https://${VPS_HOST}/" >/dev/null

          curl -fsS \
            --retry 5 \
            --retry-delay 5 \
            --retry-connrefused \
            --max-time 10 \
            "https://${VPS_HOST}/runtime-config.js" >/dev/null

          curl -fsS \
            --retry 5 \
            --retry-delay 5 \
            --retry-connrefused \
            --max-time 10 \
            "https://${VPS_HOST}/api/v1/professions" >/dev/null
